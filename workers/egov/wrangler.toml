name = "egov-staging"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
# nuxt-egov 本体と同じ Cloudflare account
account_id = "24b45709d060d957340180e995f0d373"

[vars]
# e-Gov 試験 API endpoint (公開情報 — ハードコード)。
EGOV_AUTH_BASE = "https://account2.sbx.e-gov.go.jp/auth"
EGOV_API_BASE = "https://api2.sbx.e-gov.go.jp/shinsei/v2"
# Nuxt app と同じ Software ID。client_secret は Secrets Store。
EGOV_CLIENT_ID = "K26XGOmbDusxfKsp"

[observability]
enabled = true
head_sampling_rate = 1

# MCP server (DO + WebSocket)。e-Gov 試験 API を read tool として公開する。
# agents SDK の McpAgent は session state を DO の SQLite に持つため
# new_sqlite_classes で migrate する。mountDurableMcp の default binding 名は
# "MCP_OBJECT"。Refs ippoan/mcp-cf-workers#6。
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "EgovMcp"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EgovMcp"]

# 公開 URL — staging=実運用環境モデル (Refs ippoan/secrets-inventory)。
[[routes]]
pattern = "egov-staging.ippoan.org"
custom_domain = true

# 共有 secrets store。auth-worker / ref-files-worker と同じ account-level store。
# secret_name は Nuxt app と共用 (NUXT_ prefix 付き既存 entry を再利用)。
#
# **EGOV_REFRESH_TOKEN / WORKER_API_KEY は持たない** — caller (Nuxt app / browser)
# が自分の refresh_token を /token endpoint の grant_type=refresh_token で送って
# きて、本 worker は client_secret だけ inject して e-Gov に転送する pattern。
# /api/** は caller の Authorization: Bearer をそのまま e-Gov に透過するだけで、
# 不正 token は e-Gov 側で 401 になるため worker 自前の gate は不要。
#
# NOTE (Refs #133): この Secrets Store entry は当初 store に存在せず、deploy 時に
# binding が attach されず env.EGOV_CLIENT_SECRET が undefined → `.get()` で 500 に
# なっていた。GCP Secret Manager `NUXT_EGOV_CLIENT_SECRET` を sync_from_gcp で CF
# Secrets Store に投入後、本 worker を再デプロイして binding を attach させた。
[[secrets_store_secrets]]
binding = "EGOV_CLIENT_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "NUXT_EGOV_CLIENT_SECRET"
