name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write   # frontend-ci.yml 内蔵の secret-verify job が要求 (未宣言だと
                    # gcp_secret_verify_* を渡さない caller でも startup_failure)

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'nuxt'
      install_command: 'npm install'
      # SDK を dev dist-tag 追従にするため package-lock.json は commit しない
      # (commit すると npm install が dist-tag を再解決せず古い版に固定される)。
      # setup-node の npm cache key は lockfile 不在でも package.json で算出する。
      cache_dependency_path: 'package.json'
      has_tests: false
      has_deploy: true
      npm_scope: '@ippoan'
      post_install_script: 'rm -rf node_modules/.cache .nuxt && npx nuxt prepare'
    secrets: inherit
