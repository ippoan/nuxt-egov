name: CI

on:
  pull_request:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: 'nuxt'
      has_tests: false
      has_deploy: false
      has_staging_deploy: false
      post_install_script: 'npx nuxt prepare'
    secrets: inherit
