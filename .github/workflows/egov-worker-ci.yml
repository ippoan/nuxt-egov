name: egov-worker CI

# `workers/egov/` の egov-staging worker (SDK ラッパー proxy) 専用 caller。
# Nuxt app 側の test.yml と独立して走る。trigger を path filter で限定する
# ことで Nuxt-only な PR で本 workflow が無駄に動かないようにする。

on:
  push:
    branches: [main]
    paths:
      - 'workers/egov/**'
      - '.github/workflows/egov-worker-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'workers/egov/**'
      - '.github/workflows/egov-worker-ci.yml'

# frontend-ci.yml は内蔵 auto-merge / secret-verify を持つため top-level で
# Option A (contents:write + pull-requests:write + packages:read + id-token:write)
# が必須。Refs ippoan/ci-workflows CLAUDE.md。
permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      project_type: worker
      working_directory: workers/egov
      # lockfile 未コミット (GitHub Packages auth が必要なため CI で生成) なので
      # `npm ci` ではなく `npm install` を使う。
      install_command: 'npm install'
      # cache_dependency_path を渡さないと setup-node の cache:'npm' が lockfile を
      # 探して見つからず hard error になる (Node24 強制後に顕在化)。Nuxt 側 test.yml
      # と同様に package.json を cache key に使う (lockfile commit は dev dist-tag
      # 追従のため不可)。
      cache_dependency_path: 'workers/egov/package.json'
      typecheck_command: 'npx tsc --noEmit'
      has_tests: true
      npm_scope: '@ippoan'
      # secret-verify は repo root の `wrangler.jsonc` (Nuxt app 用) を
      # autodetect してしまうため、明示的に worker 側に向ける。
      gcp_secret_verify_wrangler_path: 'workers/egov/wrangler.toml'
      # wrangler 3 が root の `wrangler.jsonc` (Nuxt app 用) を autodetect して
      # しまわないように、明示的に worker 側 config を渡す。
      deploy_staging_script: 'npx wrangler deploy --config wrangler.toml'
      deploy_release_script: 'npx wrangler deploy --config wrangler.toml'
    secrets: inherit
